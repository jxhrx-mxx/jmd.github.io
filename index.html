<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jehra | Creative Designer Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>
    <header>
        <nav>
            <div class="logo">JEHRA.DESIGN</div>
            <ul>
                <li><a href="#work">Work</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <h1>Visual Storyteller & <span class="highlight">Frontend Explorer</span></h1>
        <p>Expert in Photoshop, Illustrator, and Figma. Building beautiful digital experiences.</p>
        <a href="#work" class="btn">View My Work</a>
    </section>

    <section id="work" class="portfolio-grid">
        <div class="card">
            <img src="/world.png" alt="Ad Banner">
            <h3>Ad Banner Design</h3>
        </div>
        <div class="card">
            <img src="/poster.png" alt="Social Media Poster">
            <h3>Social Media Poster</h3>
        </div>
        <div class="card">
            <img src="/banner.gif" alt="Video Promo">
            <h3>Promotional Videos</h3>
        </div>
    </section>

    <footer>
        <p>© 2024 JMD. Built with HTML, CSS, and Passion.</p>
    </footer>
</body>
</html>
